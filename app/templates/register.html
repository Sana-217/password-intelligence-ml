{% extends "base.html" %}
{% block title %}Register — PassGuard{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Create Your Vault</h2>
  <p class="auth-sub">Choose a strong master password. It protects everything — and is never stored.</p>

  <form method="POST" action="{{ url_for('register') }}">
    <div class="form-group">
      <label for="master_password">Master Password</label>
      <input type="password" id="master_password" name="master_password"
             placeholder="At least 8 characters" autocomplete="new-password" required>
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password"
             placeholder="Repeat your master password" autocomplete="new-password" required>
    </div>

    <div class="strength-bar-wrap" id="strength-wrap" style="display:none">
      <div class="strength-bar" id="strength-bar"></div>
      <span class="strength-label" id="strength-label"></span>
    </div>

    <button type="submit" class="btn btn-primary btn-full">Create Vault</button>
  </form>

  <p class="auth-footer">Already have a vault? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}

{% block scripts %}
<script>
const masterInput = document.getElementById("master_password");
const bar         = document.getElementById("strength-bar");
const label       = document.getElementById("strength-label");
const wrap        = document.getElementById("strength-wrap");

masterInput.addEventListener("input", async () => {
  const pwd = masterInput.value;
  if (!pwd) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";

  const res = await postJSON("/analyze", { password: pwd });
  if (!res.success) return;

  const scores  = { weak: 1, medium: 2, strong: 3 };
  const colors  = { weak: "#e74c3c", medium: "#f39c12", strong: "#2ecc71" };
  const pct     = (scores[res.strength_label] / 3) * 100;

  bar.style.width      = pct + "%";
  bar.style.background = colors[res.strength_label];
  label.textContent    = res.strength_label.toUpperCase();
  label.style.color    = colors[res.strength_label];
});
</script>
{% endblock %}
