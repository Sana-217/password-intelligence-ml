{% extends "base.html" %}
{% block title %}Login — PassGuard{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Unlock Your Vault</h2>
  <p class="auth-sub">Enter your master password to access your stored passwords.</p>

  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label for="master_password">Master Password</label>
      <input type="password" id="master_password" name="master_password"
             placeholder="Your master password" autocomplete="current-password"
             autofocus required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Unlock Vault</button>
  </form>

  <p class="auth-footer">No vault yet? <a href="{{ url_for('register') }}">Create one</a></p>
</div>
{% endblock %}
